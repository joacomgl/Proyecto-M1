<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Paletas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Colorfly Palette Generator</h1>
  </header>

  <main>
    <section id="palette">
      <!-- Acá van los colores -->
    </section>

    <!-- Boton generador de paletas -->
    <button id="generate-btn">Generar Paleta</button>

      <!-- Lista desplegable -->
    <label for="cantidad">Cantidad de colores:</label>

    <select id="cantidad">
      <option value="6">6</option>
      <option value="8">8</option>
      <option value="9">9</option>
    </select>
    
    <!-- Botones para hsl y hex -->
    <menu>
      <li><button id="hsl-btn">hsl</button></li>
      <li><button id="hex-btn">hex</button></li>
    </menu>
  </main>

  <script src="js/index.js"></script>
</body>
</html>
