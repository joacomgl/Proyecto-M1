<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Paletas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Colorfly Palette Generator</h1>
  </header>

<main>
  <!-- Controles en una sola fila -->
  <div class="controles">
    <div class="formato-btns">
      <button id="hsl-btn">HSL</button>
      <button id="hex-btn">HEX</button>
    </div>

    <label for="cantidad">Cantidad:</label>
    <select id="cantidad">
      <option value="6" selected>6</option>
      <option value="8">8</option>
      <option value="9">9</option>
    </select>

    <button id="generate-btn">Generar Paleta</button>
    <button id="guardar-btn">Guardar Paleta</button>
  </div>

  <!-- Paleta -->
  <section id="palette">
    <div id="instructivo">
      <h2>¿Cómo usar Colorfly?</h2>
      <ol>
        <li>Elegí un formato: <strong>HSL</strong> o <strong>HEX</strong></li>
        <li>Elegí la cantidad de colores</li>
        <li>Apretá <strong>Generar Paleta</strong></li>
        <li>Hacé clic en un color para copiarlo</li>
        <li>Usá el 🔓 para bloquear colores que te gusten</li>
        <li>Guardá hasta 2 paletas favoritas</li>
      </ol>
    </div>
  </section>
</main>

<aside>
  <h2 id="titulo-guardadas"></h2>
  <div id="paletas-guardadas"></div>
</aside>
<div id="toast"></div>

  <script src="js/index.js"></script>
</body>
</html>
